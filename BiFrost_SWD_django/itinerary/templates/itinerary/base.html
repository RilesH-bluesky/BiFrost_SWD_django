<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost | Travel Orchestration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e 0%, #16213e 100%); border-bottom: 2px solid #0f3460; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; color: #e94560 !important; }
        .btn-primary { background-color: #0f3460; border: none; }
        .btn-primary:hover { background-color: #e94560; }
        footer { font-size: 0.85rem; color: #6c757d; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/itinerary/">
                <i class="fa-solid fa-bridge-water me-2"></i>BIFROST
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/itinerary/"><i class="fa-solid fa-house me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-light btn-sm ms-lg-3 mt-2 mt-lg-0" href="/itinerary/add/">
                            <i class="fa-solid fa-plus me-1"></i> New Trip
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5" style="min-height: 80vh;">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-4 border-top bg-white">
        <div class="container">
            <p class="mb-0">&copy; 2026 Midgard Solutions | CSCI 5300 Software Design</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
